---
layout: default
---

<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">
      {{ page.title | escape }}
    </h1>
    <p class="post-meta">
      <time
        class="dt-published"
        datetime="{{ page.date | date_to_xmlschema }}"
        itemprop="datePublished"
      >{{ page.date | date: "%Y.%m.%d" }}</time>
      {%- if page.modified_date -%}
        {%- assign mdate = page.modified_date | date_to_xmlschema -%}
        &nbsp;·&nbsp;updated <time class="dt-modified" datetime="{{ mdate }}" itemprop="dateModified">{{ page.modified_date | date: "%Y.%m.%d" }}</time>
      {%- endif -%}
    </p>
  </header>

  <hr />

  <div class="post-content e-content" itemprop="articleBody">{{ content }}</div>

  <hr class="post-bottom-separator" />

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>
